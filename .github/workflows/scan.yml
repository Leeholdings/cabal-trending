name: scan

# Triggered externally by cron-job.org via GitHub API workflow_dispatch.
# (We don't use GitHub's own cron — it's "best effort" and unreliable for
# 5-min cadences. cron-job.org has 15-second granularity and proper SLAs.)
on:
  workflow_dispatch:

# Allow committing the updated SQLite DB back to the repo so state persists
# between runs.
permissions:
  contents: write

# Prevent overlapping runs from racing on the SQLite file. `cancel-in-progress: false`
# means a new run waits for the prior one to finish rather than killing it.
concurrency:
  group: cabal-trending-state
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          SOLSCAN_API_KEY:    ${{ secrets.SOLSCAN_API_KEY }}
          DEXSCREENER_BASE_URL: https://api.dexscreener.com
          CHAIN_ID: solana
          POLL_INTERVAL_SECONDS: '20'
          LOG_LEVEL: info
        run: npm run scan

      - name: Prune DB (keep size under 100 MB push limit)
        env:
          PRUNE_SNAPSHOTS_HOURS: '8'
          PRUNE_ALERTS_DAYS:     '7'
          PRUNE_PAIRS_DAYS:      '14'
        run: npx tsx tools/prune-db.ts

      - name: Commit updated DB
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data/cabal.sqlite || true
          if git diff --cached --quiet; then
            echo "No state changes — skipping commit."
          else
            git commit -m "auto: scan $(date -u '+%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin ${{ github.ref_name }} || true
            git push
          fi
